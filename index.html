---
layout: default
---
<div class="wrap">
  {%- if site.posts.size > 0 %}
  <ul class="index-list">
    {%- for post in site.posts %}
    <li>
      <a class="index-entry" href="{{ post.url | relative_url }}">
        {%- if post.image %}
        <span class="index-plate"><img src="{% if post.image contains '://' %}{{ post.image }}{% else %}{{ post.image | relative_url }}{% endif %}" alt="" loading="lazy" decoding="async" width="1600" height="190"></span>
        {%- endif %}
        <span class="index-date">{{ post.date | date: "%Y.%m.%d" }}</span>
        <span class="index-title">{{ post.title }}</span>
      </a>
    </li>
    {%- endfor %}
  </ul>
  {%- else %}
  <p class="mono" style="text-align:center">Nothing filed yet.</p>
  {%- endif %}
</div>
