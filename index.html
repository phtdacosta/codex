---
layout: default
---
<div class="wrap">
  {%- if site.posts.size > 0 %}
  <ul class="index-list">
    {%- for post in site.posts %}
    <li>
      <span class="index-date">{{ post.date | date: "%Y.%m.%d" }}</span>
      <span class="index-title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></span>
    </li>
    {%- endfor %}
  </ul>
  {%- else %}
  <p class="mono" style="text-align:center">Nothing filed yet.</p>
  {%- endif %}
</div>
