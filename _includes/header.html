<a class="skip" href="#content">Skip to content</a>
<header class="site-head">
  <div class="wrap">
    <div class="wordmark"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Articles</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about' %} aria-current="page"{% endif %}>About</a>
      <button class="tt" id="theme-toggle" type="button" aria-label="Switch light / dark" title="Light / dark">
        <svg class="candle" viewBox="0 0 24 30" aria-hidden="true">
          <ellipse class="glow" cx="12" cy="8" rx="6.5" ry="8.5"/>
          <rect class="wax" x="8.5" y="15" width="7" height="12" rx="1.3"/>
          <path class="drip" d="M15.4 16 C 17 18 17 20.4 15.4 22 C 14.6 20 14.6 18 15.4 16 Z"/>
          <ellipse class="wax-top" cx="12" cy="15" rx="3.5" ry="1.15"/>
          <line class="wick" x1="12" y1="15" x2="12" y2="12.3"/>
          <g class="flame"><g class="flick">
            <path class="f-outer" d="M12 12.6 C 8.9 10.2 9.3 6.2 12 3 C 14.7 6.2 15.1 10.2 12 12.6 Z"/>
            <path class="f-mid" d="M12 12 C 10.2 10.2 10.5 7.3 12 5 C 13.5 7.3 13.8 10.2 12 12 Z"/>
            <ellipse class="f-core" cx="12" cy="10" rx="1.15" ry="1.9"/>
          </g></g>
        </svg>
      </button>
    </nav>
  </div>
</header>
