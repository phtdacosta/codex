# ── newsletter (Google Forms backend) ─────────────────────────
# Setup: make a Google Form with ONE "Email" short-answer question, marked Required.
#   Three-dots menu → "Get pre-filled link" → type a dummy email → Get link → Copy.
#   The link looks like:
#     …/forms/d/e/1FAIpQLS…/viewform?…&entry.123456789=dummy@example.com
#   • form_id  = the string between /d/e/ and /viewform   (begins 1FAIpQLS…)
#   • entry_id = the "entry.NUMBER" part just before =dummy@example.com
# Then, in the form's Responses tab, "Link to Sheets" so addresses collect there.
# The box stays hidden until BOTH IDs below are filled in with real values.
newsletter:
  enabled:  true
  form_id: 1FAIpQLSfgbBqe31seXZ6pvlOdwTeRUBDyRrOAlRqwIzJY5IPKe9aJXg
  entry_id: entry.279120078
  # form_id:  "YOUR_FORM_ID"
  # entry_id: "entry.YOUR_ENTRY_ID"
  title:    "The dispatch"
  blurb:    "New entries, now and then — no spam, no noise."

# Search-engine verification — paste tokens when you claim the site (optional)
webmaster_verify:
  google:   ""    # Google Search Console
  bing:     ""    # Bing Webmaster Tools

# topics surfaced on the About page / used as suggested tags
topics:
  - programming
  - engineering
  - robotics
  - defense
  - philosophy
  - entrepreneurship

# ── build ─────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  auto_ids: true

permalink: /:year/:month/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap

feed:
  path: /feed.xml

defaults:
  - scope: { path: "", type: "posts" }
    values: { layout: "post" }
  - scope: { path: "" }
    values: { layout: "page" }

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .jekyll-cache
  - build
